# ============================================================
# TMUX - Mouse-first config for simple daily use
# ============================================================

# ------------------------------------------------------------
# Basics
# ------------------------------------------------------------

# Use Ctrl-a as prefix instead of Ctrl-b.
# You mostly won't need it, but Ctrl-a is easier if needed.
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Start windows and panes at 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Bigger scrollback history
set -g history-limit 50000

# Faster response after pressing Escape
set -sg escape-time 10

# Better terminal color support
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Keep tmux open even if a pane exits, useful for seeing errors
set -g remain-on-exit off


# ------------------------------------------------------------
# Mouse-first behavior
# ------------------------------------------------------------

# Enable mouse support:
# - Click panes to focus
# - Drag pane borders to resize
# - Click windows in the status bar
# - Scroll with mouse wheel
set -g mouse on

# Select pane by clicking
set -g focus-events on

# Make copy mode use vi-style movement internally
# You don't need to memorize it, but it makes mouse selection nicer.
setw -g mode-keys vi


# ------------------------------------------------------------
# Windows and panes
# ------------------------------------------------------------

# New windows and panes open in the same directory as the current pane
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Easier optional splits if you ever use keyboard
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Optional pane movement with Vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Optional resizing with Shift + Vim keys after prefix
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5


# ------------------------------------------------------------
# Reload config
# ------------------------------------------------------------

bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"


# ------------------------------------------------------------
# Status bar - simple and readable
# ------------------------------------------------------------

set -g status on
set -g status-position bottom
set -g status-interval 5

set -g status-left-length 60
set -g status-right-length 120

# Left side: session name
set -g status-left " #[bold]Session: #S #[default]"

# Right side: helpful reminders + date/time
set -g status-right " Mouse: on | Ctrl-a d detach | %Y-%m-%d %H:%M "

# Window list
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #[bold]#I:#W#[default] "

# Pane borders
set -g pane-border-status top
set -g pane-border-format " #{pane_index}: #{pane_current_command} "
set -g display-panes-time 1500


# ------------------------------------------------------------
# Copy / scroll behavior
# ------------------------------------------------------------

# Enter copy mode manually if needed with Ctrl-a [
bind [ copy-mode

# In copy mode:
# - Mouse wheel scrolls
# - Mouse drag selects
# - Release copies selection
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel

# Copy selection with y if you ever use keyboard copy mode
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel


# ------------------------------------------------------------
# Safety / quality of life
# ------------------------------------------------------------

# Confirm before killing windows/panes
bind x confirm-before -p "Kill pane? (y/n)" kill-pane
bind & confirm-before -p "Kill window? (y/n)" kill-window

# Rename windows automatically based on running command
setw -g automatic-rename on
set -g set-titles on